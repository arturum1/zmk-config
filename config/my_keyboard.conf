# --- Split Keyboard ---
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# --- Hall Effect Support ---
CONFIG_ZMK_HALL_EFFECT=y
CONFIG_ZMK_HE_ADJUSTABLE_ACTUATION=y
CONFIG_ZMK_HE_RAPID_TRIGGER=y

# --- RGB Underglow ---
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40

# --- Power Management ---
CONFIG_ZMK_SLEEP=y

# --- Performance ---
CONFIG_USB_HID_POLLING_INTERVAL_MS=1
