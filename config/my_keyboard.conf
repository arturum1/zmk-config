# --- Split Keyboard Configuration ---
# Enable split keyboard support (required for two halves)
CONFIG_ZMK_SPLIT=y

# Use BLE (Bluetooth Low Energy) for wireless communication between halves
# ZMK supports only one split transport: BLE OR wired UART (not both)
# For wired split instead, disable BLE and enable: CONFIG_ZMK_WIRED_SPLIT=y
CONFIG_ZMK_SPLIT_BLE=y

# Number of peripheral halves that connect to the central
# For a standard split keyboard with two halves, set to 1
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=1

# Set the default role (central connects to host, peripheral connects to central)
# Override per-half using Kconfig.defconfig in each shield directory if needed
# Right half is typically central, left is peripheral
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# Optional: Fetch battery levels from peripherals to central
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Optional: Report split battery levels to host
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# --- Hall Effect Core Support (from zmk-feature-hall-effect module) ---
# Enable Hall Effect switch support (required for he,kscan-multiplexer driver)
CONFIG_ZMK_HALL_EFFECT=y

# Enable adjustable actuation points (press/release thresholds)
CONFIG_ZMK_HE_ADJUSTABLE_ACTUATION=y

# Enable Rapid Trigger feature (gaming feature for quick key retrigger)
CONFIG_ZMK_HE_RAPID_TRIGGER=y

# --- RGB Underglow Configuration ---
# Enable RGB underglow feature
CONFIG_ZMK_RGB_UNDERGLOW=y

# Enable WS2812 LED strip driver (SPI-based)
CONFIG_WS2812_STRIP=y

# Limit RGB brightness to avoid USB current limits
# USB 2.0 provides max 500mA. WS2812B draws ~60mA per LED at full white.
# 10 LEDs × 60mA = 600mA (exceeds USB limit without limits)
CONFIG_ZMK_RGB_UNDERGLOW_BRT_STEP=10
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=40

# --- Power Management ---
# Enable sleep mode for power savings (recommended for NRF52840 battery operation)
CONFIG_ZMK_SLEEP=y

# --- USB HID Performance ---
# Set USB polling interval to 1ms for high responsiveness
# Note: This is the host polling rate, not the ADC sampling rate
CONFIG_USB_HID_POLLING_INTERVAL_MS=1
