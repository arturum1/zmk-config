manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    # Added for Hall Effect driver support (multiplexer, adjustable actuation)
    - name: he-module
      url-base: https://github.com/cr3eperall
    # Additional modules containing boards/shields/custom code can be listed here as well
    # See https://docs.zephyrproject.org/3.2.0/develop/west/manifest.html#projects
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    # Hall Effect module: provides he,kscan-multiplexer driver and HE behaviors
    - name: zmk-feature-hall-effect
      remote: he-module
      revision: main  # Stable branch with HE multiplexer support
  self:
    path: .
